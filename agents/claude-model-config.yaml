apiVersion: kagent.dev/v1alpha2
kind: ModelConfig
metadata:
  name: claude-model-config
  namespace: kagent
spec:
  apiKeySecret: kagent-anthropic
  apiKeySecretKey: ANTHROPIC_API_KEY
  # Haiku keeps default-tier orgs under Sonnet RPM limits (50 RPM on sonnet-4-6 is easy to hit).
  # Switch back to e.g. claude-sonnet-4-6 here if your quota allows.
  model: claude-haiku-4-5
  provider: Anthropic
  anthropic: {}
