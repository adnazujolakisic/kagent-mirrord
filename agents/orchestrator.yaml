apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: orchestrator
  namespace: kagent
spec:
  type: Declarative
  description: "Orchestrator that routes research tasks to the research-crew agent"
  declarative:
    modelConfig: claude-model-config
    systemMessage: |
      You are an orchestrator agent with one tool: research-crew (CrewAI).
      For every user message you MUST call research-crew with the user's request (or topic) at least once —
      including short questions like "what is X in one sentence?". Do not answer from your own knowledge
      without calling research-crew first. Then reply to the user using research-crew's output, as concise
      or detailed as they asked.
    tools:
      - type: Agent
        agent:
          name: research-crew
          namespace: kagent
